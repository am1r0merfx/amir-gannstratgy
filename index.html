<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMIR GOLD Analyser</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1f2833;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border: 1px solid #45f3ff;
        }
        h1 {
            text-align: center;
            color: #45f3ff;
            margin-bottom: 25px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #66fcf1;
            font-size: 14px;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #45f3ff;
            background-color: #0b0c10;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            text-align: left;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #45f3ff;
            color: #0b0c10;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #66fcf1;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #0b0c10;
            border-left: 4px solid #66fcf1;
            border-radius: 4px;
            display: none;
        }
        .result-item {
            margin: 10px 0;
            font-size: 16px;
        }
        .result-value {
            color: #45f3ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AMIR GOLD Analyser</h1>
    
    <div class="input-group">
        <label>نرخی زێڕ (XAU/USD):</label>
        <input type="number" id="goldPrice" placeholder="بۆ نموونە: 2350">
    </div>
    
    <button onclick="calculateGann()">شیکارکردن</button>
    
    <div class="result-box" id="resultBox">
        <div class="result-item">ئاستی بەرگری یەکەم: <span class="result-value" id="res1">0</span></div>
        <div class="result-item">ئاستی بەرگری دووەم: <span class="result-value" id="res2">0</span></div>
        <div class="result-item">ئاستی پاڵپشتی یەکەم: <span class="result-value" id="sup1">0</span></div>
        <div class="result-item">ئاستی پاڵپشتی دووەم: <span class="result-value" id="sup2">0</span></div>
    </div>
</div>

<script>
    function calculateGann() {
        const price = parseFloat(document.getElementById('goldPrice').value);
        if (isNaN(price) || price <= 0) {
            alert('تکایە نرخێکی ڕاست درۆست داخل بکە');
            return;
        }
        
        // هاوکێشەی گان بۆ تاقیکردنەوە
        const root = Math.sqrt(price);
        const r1 = Math.pow(root + 0.125, 2);
        const r2 = Math.pow(root + 0.25, 2);
        const s1 = Math.pow(root - 0.125, 2);
        const s2 = Math.pow(root - 0.25, 2);
        
        document.getElementById('res1').innerText = r1.toFixed(2);
        document.getElementById('res2').innerText = r2.toFixed(2);
        document.getElementById('sup1').innerText = s1.toFixed(2);
        document.getElementById('sup2').innerText = s2.toFixed(2);
        
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
