<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMIR GANN ULTIMATE WHEEL</title>
    <style>
        :root {
            --bg-main: #06090d;
            --bg-container: #0d1117;
            --border-color: #30363d;
            --accent-neon: #00ffcc;
            --accent-gold: #ffd700;
            --text-light: #f0f6fc;
            --text-gray: #8b949e;
            --btn-red: #da3637;
            --bg-bot: #161b22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .top-navbar {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-container);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
        }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: var(--text-gray);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .nav-btn.active {
            background-color: #1f242c;
            color: var(--accent-neon);
            border-color: var(--accent-neon);
        }

        .container {
            background-color: var(--bg-container);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .header-title {
            background-color: #161b22;
            border: 1px solid var(--accent-gold);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            color: var(--accent-gold);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .section-title {
            color: var(--accent-neon);
            border-bottom: 1px dashed #30363d;
            padding-bottom: 5px;
            margin: 20px 0 12px 0;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 11px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-main);
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .gann-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 13px;
        }

        .gann-table th, .gann-table td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
        }

        .gann-table th {
            background-color: #161b22;
            color: var(--text-gray);
        }

        .res-text { color: #da3637; font-weight: bold; }
        .sup-text { color: #2ea44f; font-weight: bold; }

        .bot-box {
            background-color: var(--bg-bot);
            border: 1px solid #238636;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .bot-status {
            font-size: 11px;
            background-color: #238636;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .signal-card {
            background: #0d1117;
            border-left: 4px solid #fff;
            padding: 12px;
            border-radius: 6px;
        }

        .signal-buy { border-left-color: #2ea44f; }
        .signal-sell { border-left-color: #da3637; }
        .signal-hold { border-left-color: var(--accent-gold); }

        .signal-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .badge-buy { background: #2ea44f; color: #fff; }
        .badge-sell { background: #da3637; color: #fff; }
        .badge-hold { background: #30363d; color: var(--text-gray); }

        .levels-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 13px;
            margin-top: 8px;
        }

        .level-item {
            background: #161b22;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .wheel-box {
            width: 100%;
            max-width: 500px;
            background: var(--bg-container);
            border-radius: 12px;
            padding: 20px 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            border: 1px solid var(--border-color);
        }

        canvas {
            background-color: #040608;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="top-navbar">
    <button class="nav-btn active">🎡 چەرخی جان</button>
    <button class="nav-btn">⏹️ چوارگۆشەی 9</button>
    <button class="nav-btn">⬡ شەش پاڵوو</button>
    <button class="nav-btn">📊 ماتریکس 24</button>
</div>

<div class="container">
    <div class="header-title">
        🎡 سیستمی پێشکەوتووی ماتماتیکی فرەگۆشەکانی چەرخی جان
    </div>

    <div class="section-title">📊 داتاکانی نرخ</div>
    
    <label>نرخی سەنتەر (دەستپێکی چەرخ):</label>
    <input type="number" id="centerPrice" value="2300" oninput="runGannEngine()">
    
    <label>نرخی ئێستای بازاڕ (بۆ پشکنینی بۆت):</label>
    <input type="number" id="currentPrice" value="2328" oninput="runGannEngine()">

    <div class="section-title">🧭 دیاریکردنی فرەگۆشە و گۆشەکانی جان (Gann Polygons)</div>
    
    <label>تکایە گۆشە یان جۆری دابەشکارییەکە هەڵبژێره:</label>
    <select id="anglePreset" onchange="runGannEngine()">
        <option value="120">٣ گۆشە — (120 پلە)</option>
        <option value="90" selected>٤ گۆشە — (90... پلە)</option>
        <option value="72">٥ گۆشە — (72 پلە)</option>
        <option value="60">٦ گۆشە — (60 پلە)</option>
        <option value="51.4">٧ گۆشە — (51.4 پلە)</option>
        <option value="45">٨ گۆشە — (45 پلە)</option>
        <option value="40">٩ گۆشە — (40 پلە)</option>
        <option value="36">١٠ گۆشە — (36 پلە)</option>
        <option value="32.7">١١ گۆشە — (32.7 پلە)</option>
        <option value="30">١٢ گۆشە — (30 پلە)</option>
        <option value="27.6">١٣ گۆشە — (27.6 پلە)</option>
        <option value="25.7">١٤ گۆشە — (25.7 پلە)</option>
        <option value="24">١٥ گۆشە — (24 پلە)</option>
        <option value="22.5">١٦ گۆشە — (22.5 پلە)</option>
        <option value="21.1">١٧ گۆشە — (21.1 پلە)</option>
        <option value="20">١٨ گۆشە — (20 پلە)</option>
        <option value="18.9">١٩ گۆشە — (18.9 پلە)</option>
        <option value="18">٢٠ گۆشە — (18 پلە)</option>
        <option value="17.1">٢١ گۆشە — (17.1 پلە)</option>
        <option value="16.3">٢٢ گۆشە — (16.3 پلە)</option>
        <option value="15.6">٢٣ گۆشە — (15.6 پلە)</option>
        <option value="15">٢٤ گۆشە — (15 پلە)</option>
    </select>

    <div class="section-title">📋 خشتەی سەرجەم قۆناغەکانی ئاستی هەڵبژێردراو</div>
    <table class="gann-table">
        <thead>
            <tr>
                <th>قۆناغ</th>
                <th>🔴 هێڵی بەرگری (Resistance)</th>
                <th>🟢 هێڵی پشتگیری (Support)</th>
            </tr>
        </thead>
        <tbody id="gannTableBody">
            </tbody>
    </table>

    <div class="bot-box">
        <div class="bot-header">
            <span style="font-weight: bold; color: var(--accent-neon); font-size: 13px;">🤖 بۆتی چاودێری پۆلیگۆنەکانی جان</span>
            <span class="bot-status" id="botTime">Scan Log</span>
        </div>
        
        <div id="signalContainer"></div>
    </div>
</div>

<div class="wheel-box">
    <canvas id="gannCanvas" width="360" height="360"></canvas>
</div>

<script>
    function runGannEngine() {
        updateClock();
        const centerPrice = parseFloat(document.getElementById('centerPrice').value) || 0;
        const currentPrice = parseFloat(document.getElementById('currentPrice').value) || 0;
        const stepAngle = parseFloat(document.getElementById('anglePreset').value);

        if (centerPrice <= 0) return;

        let levels = [];
        let baseRoot = Math.sqrt(centerPrice);
        
        let tableHtml = "";
        // ئەژمارکردنی ٤ ئاستی سەرەکی بازنەکە لەسەر بنەمای گۆشەی گۆڕاو
        for (let i = 1; i <= 4; i++) {
            let stepValue = (stepAngle / 360) * 2;
            let resLevel = Math.pow(baseRoot + (stepValue * 0.125 * i), 2);
            let supLevel = Math.pow(baseRoot - (stepValue * 0.125 * i), 2);
            
            levels.push({ stage: i, resistance: resLevel, support: supLevel });
            
            tableHtml += `
                <tr>
                    <td>ئاستی قۆناغی ${i}</td>
                    <td class="res-text">${Math.round(resLevel)}</td>
                    <td class="sup-text">${Math.round(supLevel)}</td>
                </tr>`;
        }
        document.getElementById('gannTableBody').innerHTML = tableHtml;

        processBotSignal(currentPrice, levels, stepAngle);
        drawWheel(centerPrice, stepAngle);
    }

    function processBotSignal(currentPrice, levels, stepAngle) {
        const container = document.getElementById('signalContainer');
        
        let closestRes = levels[0].resistance;
        let closestSup = levels[0].support;

        levels.forEach(lvl => {
            if (lvl.resistance > currentPrice && lvl.resistance < closestRes) closestRes = lvl.resistance;
            if (lvl.support < currentPrice && lvl.support > closestSup) closestSup = lvl.support;
        });

        let resDiff = Math.abs(currentPrice - closestRes);
        let supDiff = Math.abs(currentPrice - closestSup);
        
        let detailsHtml = "";

        if (resDiff <= 4) { 
            let sl = closestRes + 6; 
            let tp1 = currentPrice - (resDiff * 2) - 5;
            let tp2 = closestSup + 4;
            
            detailsHtml = `
                <div class="signal-card signal-sell">
                    <span class="signal-badge badge-sell">🔴 سیگناڵی فرۆشتن: SELL (گۆشەی ${stepAngle}°)</span>
                    <div>بۆت دۆزییەوە: نرخ گەیشتە خاڵی بەرگری لە دابەشکاری ${stepAngle}° پلەیی جان.</div>
                    <div class="levels-grid">
                        <div class="level-item">🎯 نرخی ئێستا: <b>${Math.round(currentPrice)}</b></div>
                        <div class="level-item" style="color:#da3637;">🛑 ستۆپ لۆز (SL): <b>${Math.round(sl)}</b></div>
                        <div class="level-item" style="color:#2ea44f;">💰 ئامانج ١: <b>${Math.round(tp1)}</b></div>
                        <div class="level-item" style="color:#2ea44f;">💰 ئامانج ٢: <b>${Math.round(tp2)}</b></div>
                    </div>
                </div>`;
        } else if (supDiff <= 4) { 
            let sl = closestSup - 6; 
            let tp1 = currentPrice + (supDiff * 2) + 5;
            let tp2 = closestRes - 4;

            detailsHtml = `
                <div class="signal-card signal-buy">
                    <span class="signal-badge badge-buy">🟢 سیگناڵی کڕین: BUY (گۆشەی ${stepAngle}°)</span>
                    <div>بۆت دۆزییەوە: نرخ کاردانەوەی ئەرێنی هەبوو لەسەر پاڵپشتی گۆشەی ${stepAngle}°.</div>
                    <div class="levels-grid">
                        <div class="level-item">🎯 نرخی ئێستا: <b>${Math.round(currentPrice)}</b></div>
                        <div class="level-item" style="color:#da3637;">🛑 ستۆپ لۆز (SL): <b>${Math.round(sl)}</b></div>
                        <div class="level-item" style="color:#2ea44f;">💰 ئامانج ١: <b>${Math.round(tp1)}</b></div>
                        <div class="level-item" style="color:#2ea44f;">💰 ئامانج ٢: <b>${Math.round(tp2)}</b></div>
                    </div>
                </div>`;
        } else {
            detailsHtml = `
                <div class="signal-card signal-hold">
                    <span class="signal-badge badge-hold">🟡 چاوڕوانیکردنی بازاڕ (SCANNING)</span>
                    <div>چاوڕوانی نزیکبوونەوە لە هێڵەکانی گۆشەی ${stepAngle}°:</div>
                    <div class="levels-grid">
                        <div class="level-item" style="color:#da3637;">🔺 بەرگری داهاتوو: <b>${Math.round(closestRes)}</b></div>
                        <div class="level-item" style="color:#2ea44f;">🔻 پشتگیری داهاتوو: <b>${Math.round(closestSup)}</b></div>
                    </div>
                </div>`;
        }

        container.innerHTML = detailsHtml;
    }

    function drawWheel(centerPrice, stepAngle) {
        const canvas = document.getElementById('gannCanvas');
        const ctx = canvas.getContext('2d');
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // کێشانی تیشکەکان ڕێک بەپێی گۆشەی دابەشکارییەکە بۆ ئەوەی گرافیکەکە ورد بێت
        for (let angle = 0; angle < 360; angle += stepAngle) {
            let rad = (angle * Math.PI) / 180;
            ctx.beginPath(); ctx.moveTo(cx, cy);
            ctx.lineTo(cx + 160 * Math.cos(rad), cy + 160 * Math.sin(rad));
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // بازنەی چەرخەکە
        ctx.beginPath(); ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffd700'; ctx.fill();
        ctx.fillStyle = '#000'; ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(centerPrice, cx, cy);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('botTime').innerText = "کاتی دواین چاودێری: " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    window.onload = runGannEngine;
</script>

</body>
</html>
